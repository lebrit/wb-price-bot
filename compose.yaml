services:
  bot:
    build:
      context: .
    image: wb-price-bot:${APP_VERSION:-0.1.0}
    container_name: wb-price-bot
    restart: unless-stopped
    init: true
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - ${WB_CONFIG_FILE:-.env}
    environment:
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram-token
      SESSION_ENCRYPTION_KEY_FILE: /run/secrets/session-key
      DATA_DIR: /data
    volumes:
      - ${WB_DATA_DIR:-./data}:/data
      - ${WB_SECRETS_DIR:-./secrets}:/run/secrets:ro
    tmpfs:
      - /tmp:size=256m,noexec,nosuid
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-m", "wb_price_bot", "healthcheck"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
