name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy
      - run: pytest
      - run: python -m compileall -q src scripts tests
      - run: bash -n scripts/install.sh
      - run: python -m pip install pip-audit
      - run: python -m pip_audit -r requirements.lock

  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Validate Compose model
        run: |
          mkdir -p data secrets
          touch secrets/telegram-token secrets/session-key secrets/mpstats-token
          cp .env.example .env
          export AUTH_DOMAIN=auth.example.com
          docker compose config >/dev/null
      - name: Validate Caddy configuration
        run: >-
          docker run --rm -e AUTH_DOMAIN=auth.example.com
          -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2.10.2-alpine caddy validate --config /etc/caddy/Caddyfile
      - name: Build image
        run: docker build -t wb-price-bot:ci .
      - name: Smoke test container entrypoint
        run: >-
          docker run --rm --init
          --tmpfs /tmp:size=256m,noexec,nosuid
          --tmpfs /tmp/.X11-unix:mode=1777
          wb-price-bot:ci
          python -m wb_price_bot version | grep -Fx 0.4.0
