<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WB Price Bot Connector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1>WB Price Bot</h1>
    <p>Сначала войдите на <b>wildberries.ru</b> обычным способом.</p>
    <form id="connector-form">
      <label>Адрес сервера
        <input id="server" type="url" placeholder="https://wb.example.com" required>
      </label>
      <label>Одноразовый код
        <input id="code" type="text" inputmode="latin" maxlength="10"
               placeholder="A1B2C3D4E5" autocomplete="one-time-code" required>
      </label>
      <button id="connect" type="submit">Подключить аккаунт</button>
    </form>
    <p id="status" role="status"></p>
    <p class="small">Телефон и SMS-код остаются только на сайте Wildberries.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
